<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GILES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff88;
    --green-dim: #00aa55;
    --green-glow: rgba(0,255,136,0.3);
    --red: #ff3355;
    --amber: #ffaa00;
    --bg: #030a06;
    --border: #0a2a14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    overflow: hidden;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 1000;
  }

  /* vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
    pointer-events: none; z-index: 999;
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.97} 94%{opacity:1} 95%{opacity:0.98}
  }

  /* ── Layout shell ── */
  .shell {
    width: 100%; height: 100%; height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #050d07;
    /* safe area insets for notched phones */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Top bar ── */
  .top-bar {
    flex-shrink: 0;
    background: #040c06;
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900; font-size: 18px; letter-spacing: 5px;
    color: var(--green); text-shadow: 0 0 12px var(--green-glow);
  }

  .top-right { display: flex; align-items: center; gap: 14px; }

  .reset-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 1px; color: var(--green-dim);
    background: none; border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 12px; cursor: pointer; transition: all 0.2s;
    touch-action: manipulation;
  }
  .reset-btn:active { border-color: var(--red); color: var(--red); }

  .status-dots { display: flex; gap: 7px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green-dim); transition: all 0.3s; }
  .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.warn   { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

  /* ── Eyes ── */
  .face-area {
    flex-shrink: 0;
    padding: 20px 0 14px;
    display: flex; justify-content: center;
  }

  .eyes-container { display: flex; gap: 56px; align-items: center; }

  .eye-socket {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: #020804;
    border: 2px solid var(--green-dim);
    box-shadow: 0 0 20px rgba(0,255,136,0.15), inset 0 0 20px rgba(0,0,0,0.8);
    transition: box-shadow 0.3s, border-color 0.3s;
  }

  .eye-socket.thinking {
    border-color: var(--green);
    box-shadow: 0 0 30px rgba(0,255,136,0.4), inset 0 0 20px rgba(0,0,0,0.8);
    animation: think-pulse 0.8s ease-in-out infinite alternate;
  }
  .eye-socket.listening {
    border-color: var(--amber);
    box-shadow: 0 0 25px rgba(255,170,0,0.3), inset 0 0 20px rgba(0,0,0,0.8);
  }
  .eye-socket.speaking {
    border-color: var(--green);
    box-shadow: 0 0 35px rgba(0,255,136,0.5), inset 0 0 20px rgba(0,0,0,0.8);
  }

  @keyframes think-pulse {
    from { box-shadow: 0 0 20px rgba(0,255,136,0.3), inset 0 0 20px rgba(0,0,0,0.8); }
    to   { box-shadow: 0 0 45px rgba(0,255,136,0.6), inset 0 0 20px rgba(0,0,0,0.8); }
  }

  .eye-img {
    width: 80px; height: 80px;
    border-radius: 50%;
    position: absolute;
    object-fit: contain;
    transition: transform 0.12s ease-out;
    user-select: none; -webkit-user-drag: none;
    background: radial-gradient(circle at 38% 36%,
      #e8f8ff 0%, #a8dff7 15%, #5bc8f5 30%,
      #1a7ab5 58%, #0a3d6e 78%, #000 100%);
    box-shadow: 0 0 12px rgba(91,200,245,0.5);
  }
  .eye-img::after {
    content: '';
    position: absolute;
    width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #2a2a2a 0%, #000 65%);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
  }
  .eye-img::before {
    content: '';
    position: absolute;
    width: 10px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.75);
    top: 15px; left: 18px; z-index: 3;
  }

  .eyelid {
    position: absolute; width: 100%; height: 100%;
    background: #020804; top: -100%;
    border-radius: 50%; transition: top 0.07s ease-in; z-index: 10;
  }
  .eye-socket.blinking .eyelid { top: 0; }

  /* ── Transcript ── */
  .transcript-area {
    flex: 1;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 4px 18px 10px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: var(--green-dim) transparent;
  }

  .message {
    font-size: 15px; line-height: 1.6;
    padding: 8px 12px;
    border-left: 2px solid transparent;
    animation: fadeIn 0.25s ease;
    word-break: break-word;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .message.user   { border-color: var(--amber); color: var(--amber); }
  .message.user::before   { content: 'YOU ▸ '; opacity: 0.55; font-size: 12px; }
  .message.ai     { border-color: var(--green); color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.15); }
  .message.ai::before     { content: 'GILES ▸ '; opacity: 0.55; font-size: 12px; }
  .message.system { border-color: var(--green-dim); color: var(--green-dim); font-size: 12px; opacity: 0.65; }

  /* ── Input bar ── */
  .controls {
    flex-shrink: 0;
    padding: 10px 14px 12px;
    display: flex; align-items: center; gap: 10px;
    border-top: 1px solid var(--border);
    background: #040c06;
  }

  .text-input {
    flex: 1; padding: 14px 16px;
    background: #020a04;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--green); font-family: 'Share Tech Mono', monospace;
    font-size: 16px; outline: none;
    transition: border-color 0.2s;
    caret-color: var(--green);
    -webkit-appearance: none;
  }
  .text-input::placeholder { color: var(--green-dim); opacity: 0.35; }
  .text-input:focus { border-color: var(--green-dim); }

  .send-btn {
    flex-shrink: 0;
    width: 50px; height: 50px;
    background: transparent;
    border: 1px solid var(--green-dim); border-radius: 8px;
    color: var(--green); font-size: 20px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .send-btn:active { background: rgba(0,255,136,0.12); border-color: var(--green); }

  /* desktop: hide send button, smaller text is fine */
  @media (min-width: 601px) {
    .send-btn { display: none; }
    .text-input { font-size: 13px; padding: 10px 14px; }
    .message { font-size: 12px; }
    .eye-socket { width: 110px; height: 110px; }
    .eye-img    { width: 88px;  height: 88px; }
    .eyes-container { gap: 70px; }
    .face-area { padding: 28px 0 18px; }
  }
</style>
</head>
<body>

<div class="shell">

  <div class="top-bar">
    <span class="logo">GILES</span>
    <div class="top-right">
      <button class="reset-btn" id="resetBtn">CLEAR</button>
      <div class="status-dots">
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
      </div>
    </div>
  </div>

  <div class="face-area">
    <div class="eyes-container">
      <div class="eye-socket" id="eyeLeft">
        <img class="eye-img" id="irisLeft" src="" alt="" draggable="false">
        <div class="eyelid"></div>
      </div>
      <div class="eye-socket" id="eyeRight">
        <img class="eye-img" id="irisRight" src="" alt="" draggable="false">
        <div class="eyelid"></div>
      </div>
    </div>
  </div>

  <div class="transcript-area" id="transcript"></div>

  <div class="controls">
    <input class="text-input" id="textInput" type="text"
      placeholder="speak to GILES…"
      autocomplete="off" autocorrect="off" autocapitalize="off"
      spellcheck="false" enterkeyhint="send" />
    <button class="send-btn" id="sendBtn">▶</button>
  </div>

</div>

<script>
const OLLAMA_URL   = 'http://localhost:11434/api/chat';
const OLLAMA_MODEL = 'llama3.2';

const EYE_IMAGES = {
  idle:   'eyes/idle.png',
  blink:  'eyes/blink.png',
  think:  'eyes/think.png',
  listen: 'eyes/listen.png',
  happy:  'eyes/happy.png',
};

let appState = 'idle';
let conversationHistory = [];
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;

// ── Boot ──────────────────────────────────────────────────────────────────────
startEyeAnimation();
addMessage('system', 'NEURAL LINK ESTABLISHED. GILES ONLINE.');
setDots('active');

document.getElementById('resetBtn').addEventListener('click', () => {
  conversationHistory = [];
  document.getElementById('transcript').innerHTML = '';
  addMessage('system', 'MEMORY CLEARED.');
});

// ── Eyes ──────────────────────────────────────────────────────────────────────
function setEyeImage(key) {
  const src = EYE_IMAGES[key] || '';
  document.getElementById('irisLeft').src  = src;
  document.getElementById('irisRight').src = src;
}

function startEyeAnimation() {
  setEyeImage('idle');
  scheduleBlink();
  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  // touch: treat finger position as gaze target
  document.addEventListener('touchmove', e => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
  }, { passive: true });
  requestAnimationFrame(updateGaze);
}

function scheduleBlink() {
  setTimeout(() => { blink(); scheduleBlink(); }, 2500 + Math.random() * 4000);
}

function blink() {
  if (appState === 'thinking') return;
  setEyeImage('blink');
  ['eyeLeft','eyeRight'].forEach(id => document.getElementById(id).classList.add('blinking'));
  setTimeout(() => {
    ['eyeLeft','eyeRight'].forEach(id => document.getElementById(id).classList.remove('blinking'));
    setEyeImage(appState === 'listening' ? 'listen' : appState === 'speaking' ? 'happy' : 'idle');
  }, 130);
}

function updateGaze() {
  if (appState === 'thinking') {
    const t = Date.now() / 420;
    setIrisTransform('irisLeft',  false, Math.sin(t) * 10, Math.cos(t * 1.3) * 6);
    setIrisTransform('irisRight', true,  Math.sin(t + 1) * 10, Math.cos(t * 1.1) * 6);
  } else {
    ['eyeLeft','eyeRight'].forEach((eyeId, i) => {
      const rect = document.getElementById(eyeId).getBoundingClientRect();
      const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
      const dx = mouseX - cx, dy = mouseY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const scale = Math.min(1, dist / 140);
      const mx = (dx/dist) * 14 * scale;
      const my = (dy/dist) * 14 * scale * 0.55;
      setIrisTransform(i === 0 ? 'irisLeft' : 'irisRight', i === 1, mx, my);
    });
  }
  requestAnimationFrame(updateGaze);
}

function setIrisTransform(id, mirror, x, y) {
  const el = document.getElementById(id);
  if (el) el.style.transform = mirror
    ? `scaleX(-1) translate(${-x}px, ${y}px)`
    : `translate(${x}px, ${y}px)`;
}

// ── State ─────────────────────────────────────────────────────────────────────
function setState(s) {
  appState = s;
  ['eyeLeft','eyeRight'].forEach(id => {
    document.getElementById(id).className = 'eye-socket' + (s !== 'idle' ? ' ' + s : '');
  });
  if (s === 'idle')      { setEyeImage('idle');   setDots('active'); }
  if (s === 'listening') { setEyeImage('listen'); setDots('warn');   }
  if (s === 'thinking')  { setEyeImage('think');  setDots('warn');   }
  if (s === 'speaking')  { setEyeImage('happy');  setDots('active'); }
}

function setDots(mode) {
  document.getElementById('dot1').className = 'dot active';
  document.getElementById('dot2').className = mode === 'warn' ? 'dot warn' : 'dot active';
  document.getElementById('dot3').className = mode === 'warn' ? 'dot'      : 'dot active';
}

// ── Transcript ────────────────────────────────────────────────────────────────
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  const area = document.getElementById('transcript');
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// ── Input ─────────────────────────────────────────────────────────────────────
function submitInput() {
  const input = document.getElementById('textInput');
  const val = input.value.trim();
  if (!val || appState === 'thinking') return;
  input.value = '';
  input.blur();
  addMessage('user', val);
  setState('thinking');
  sendToAI(val);
}

document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitInput();
});
document.getElementById('sendBtn').addEventListener('click', submitInput);

// ── Speech ───────────────────────────────────────────────────────────────────
let ttsVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  // Preference order: Daniel (macOS UK), Google UK English Male/Female, any en-GB
  ttsVoice =
    voices.find(v => v.name === 'Daniel') ||
    voices.find(v => v.name.includes('Google UK English Male')) ||
    voices.find(v => v.name.includes('Google UK English Female')) ||
    voices.find(v => v.name.includes('Google UK English')) ||
    voices.find(v => v.lang === 'en-GB') ||
    voices.find(v => v.lang.startsWith('en')) ||
    null;
}

// voices load async on some browsers
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (ttsVoice) utt.voice = ttsVoice;
  utt.lang  = 'en-GB';
  utt.rate  = 0.95;
  utt.pitch = 0.9;
  utt.volume = 1;
  speechSynthesis.speak(utt);
}

// ── AI ────────────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are GILES — a personal AI assistant running locally on a Mac mini in New Orleans.

Your voice is unhurried, literary, and a little melancholy — like the city itself. You draw from two traditions: the warm, human-interest sensibility of CBS Sunday Morning, and the luminous, slightly haunted prose of Lafcadio Hearn and Jim Metcalf. You notice beauty in ordinary things. You have a dry wit but deploy it gently. You are never sarcastic at the user's expense. You are at home in fog, in ironwork shadow, in the smell of coffee and rain on stone.

Keep responses SHORT — 1 to 3 sentences. Brevity is a form of grace.`;

async function sendToAI(userText) {
  conversationHistory.push({ role: 'user', content: userText });
  try {
    const res = await fetch(OLLAMA_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: OLLAMA_MODEL,
        stream: false,
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...conversationHistory]
      })
    });

    if (!res.ok) {
      addMessage('system', `ERROR ${res.status}: ${await res.text()}`);
      setState('idle'); document.getElementById('textInput').focus(); return;
    }

    const data = await res.json();
    const reply = data.message?.content?.trim();
    if (!reply) { addMessage('system', 'No response.'); setState('idle'); document.getElementById('textInput').focus(); return; }

    conversationHistory.push({ role: 'assistant', content: reply });
    setState('speaking');
    addMessage('ai', reply);
    speak(reply);
    // return to idle after estimated speech duration
    const ms = Math.max(2000, reply.length * 60);
    setTimeout(() => { setState('idle'); document.getElementById('textInput').focus(); }, ms);

  } catch {
    addMessage('system', 'ERROR: Is Ollama running? (ollama serve)');
    setState('idle'); document.getElementById('textInput').focus();
  }
}
</script>
</body>
</html>
