<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GILES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff88;
    --green-dim: #00aa55;
    --green-glow: rgba(0,255,136,0.3);
    --red: #ff3355;
    --amber: #ffaa00;
    --bg: #030a06;
    --panel: #060f08;
    --border: #0a2a14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 1000;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
    pointer-events: none; z-index: 999;
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.97} 94%{opacity:1} 95%{opacity:0.98}
  }

  .monitor {
    width: min(700px, 95vw);
    background: #050d07;
    border: 2px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,255,136,0.08), 0 0 80px rgba(0,255,136,0.04), inset 0 0 60px rgba(0,0,0,0.5);
    position: relative;
  }

  .monitor-top {
    background: #040c06;
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-radius: 12px 12px 0 0;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900; font-size: 14px; letter-spacing: 4px;
    color: var(--green); text-shadow: 0 0 10px var(--green-glow);
  }

  .top-right { display: flex; align-items: center; gap: 12px; }

  .reset-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    letter-spacing: 1px; color: var(--green-dim);
    background: none; border: 1px solid var(--border);
    border-radius: 3px; padding: 3px 8px; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  .status-dots { display: flex; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-dim); transition: all 0.3s; }
  .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.warn   { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .dot.alert  { background: var(--red);   box-shadow: 0 0 8px var(--red); }

  .face-area {
    padding: 30px 40px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }

  .eyes-container { display: flex; gap: 60px; align-items: center; }

  .eye-socket {
    width: 100px; height: 60px; background: #020804;
    border: 2px solid var(--green-dim); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 20px rgba(0,255,136,0.15), inset 0 0 20px rgba(0,0,0,0.8);
    overflow: hidden; transition: border-color 0.3s;
  }
  .eye-socket.listening { border-color: var(--amber); box-shadow: 0 0 25px rgba(255,170,0,0.3), inset 0 0 20px rgba(0,0,0,0.8); }
  .eye-socket.thinking  { border-color: var(--green); box-shadow: 0 0 30px rgba(0,255,136,0.4), inset 0 0 20px rgba(0,0,0,0.8); animation: think-pulse 0.8s ease-in-out infinite alternate; }
  .eye-socket.speaking  { border-color: var(--green); box-shadow: 0 0 35px rgba(0,255,136,0.5), inset 0 0 20px rgba(0,0,0,0.8); }

  @keyframes think-pulse {
    from { box-shadow: 0 0 20px rgba(0,255,136,0.3), inset 0 0 20px rgba(0,0,0,0.8); }
    to   { box-shadow: 0 0 45px rgba(0,255,136,0.6), inset 0 0 20px rgba(0,0,0,0.8); }
  }

  .iris {
    width: 44px; height: 44px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #00ff88 0%, #00cc66 30%, #006633 70%, #001a0d 100%);
    position: absolute; transition: transform 0.15s ease-out;
    box-shadow: 0 0 12px rgba(0,255,136,0.6);
  }

  .pupil {
    width: 18px; height: 18px; border-radius: 50%; background: #000;
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 2; transition: all 0.2s;
  }
  .pupil.dilated { width: 26px; height: 26px; }

  .eyelid {
    position: absolute; width: 100%; height: 100%; background: #020804;
    top: -100%; border-radius: 50%; transition: top 0.08s ease-in; z-index: 10;
  }
  .eye-socket.blinking .eyelid { top: 0; }

  .waveform { display: flex; gap: 3px; align-items: center; height: 30px; opacity: 0; transition: opacity 0.3s; }
  .waveform.active { opacity: 1; }
  .wave-bar { width: 3px; background: var(--green); border-radius: 2px; animation: wave-idle 1s ease-in-out infinite alternate; box-shadow: 0 0 4px var(--green); }
  @keyframes wave-idle    { from{height:4px} to{height:8px} }
  .waveform.listening .wave-bar { animation: wave-listen 0.3s ease-in-out infinite alternate; }
  @keyframes wave-listen  { from{height:4px} to{height:28px} }
  .waveform.speaking .wave-bar  { animation: wave-speak 0.2s ease-in-out infinite alternate; }
  @keyframes wave-speak   { from{height:6px} to{height:24px} }

  .transcript-area {
    padding: 0 20px 10px;
    min-height: 120px; max-height: 160px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 6px;
    scrollbar-width: thin; scrollbar-color: var(--green-dim) transparent;
  }

  .message { font-size: 11px; line-height: 1.5; padding: 6px 10px; border-left: 2px solid transparent; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .message.user   { border-color: var(--amber); color: var(--amber); }
  .message.user::before   { content: 'YOU ▸ '; opacity: 0.6; }
  .message.ai     { border-color: var(--green); color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.2); }
  .message.ai::before     { content: 'GILES ▸ '; opacity: 0.6; }
  .message.system { border-color: var(--green-dim); color: var(--green-dim); font-size: 10px; opacity: 0.7; }

  .controls {
    padding: 12px 20px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border); gap: 8px;
  }

  .talk-btn {
    flex: 1; padding: 12px 20px; background: transparent;
    border: 2px solid var(--green-dim); border-radius: 6px;
    color: var(--green-dim); font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .talk-btn:hover { border-color: var(--green); color: var(--green); box-shadow: 0 0 15px var(--green-glow); }
  .talk-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(255,170,0,0.05); box-shadow: 0 0 20px rgba(255,170,0,0.2); animation: btn-pulse 0.6s ease-in-out infinite alternate; }
  @keyframes btn-pulse { from{box-shadow:0 0 10px rgba(255,170,0,0.2)} to{box-shadow:0 0 25px rgba(255,170,0,0.4)} }

  .text-input {
    flex: 1; padding: 10px 12px; background: transparent;
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--green); font-family: 'Share Tech Mono', monospace;
    font-size: 12px; outline: none; transition: border-color 0.2s;
    caret-color: var(--green);
  }
  .text-input::placeholder { color: var(--green-dim); opacity: 0.4; }
  .text-input:focus { border-color: var(--green-dim); }

  .state-label { font-size: 10px; letter-spacing: 1px; color: var(--green-dim); min-width: 70px; text-align: right; opacity: 0.7; }

  /* API key overlay */
  .api-overlay {
    position: absolute; inset: 0;
    background: rgba(3,10,6,0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; border-radius: 12px; padding: 30px; z-index: 50;
  }
  .api-overlay h2 { font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 3px; color: var(--green); text-shadow: 0 0 10px var(--green-glow); }
  .api-overlay p  { font-size: 10px; color: var(--green-dim); text-align: center; line-height: 1.6; max-width: 340px; }
  .api-input {
    width: 100%; max-width: 360px; padding: 10px 14px;
    background: #020804; border: 1px solid var(--green-dim); border-radius: 4px;
    color: var(--green); font-family: 'Share Tech Mono', monospace; font-size: 12px;
    outline: none; transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }
  .api-submit {
    padding: 10px 30px; background: transparent; border: 2px solid var(--green);
    border-radius: 4px; color: var(--green); font-family: 'Orbitron', monospace;
    font-size: 11px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
  }
  .api-submit:hover { background: rgba(0,255,136,0.08); box-shadow: 0 0 15px var(--green-glow); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="monitor">

  <!-- Boot overlay (hidden immediately on load) -->
  <div class="api-overlay hidden" id="apiOverlay"></div>

  <!-- Top bar -->
  <div class="monitor-top">
    <span class="logo">GILES</span>
    <div class="top-right">
      <button class="reset-btn" id="resetKeyBtn">CLEAR MEMORY</button>
      <div class="status-dots">
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
      </div>
    </div>
  </div>

  <!-- Eyes -->
  <div class="face-area">
    <div class="eyes-container">
      <div class="eye-socket" id="eyeLeft">
        <div class="iris" id="irisLeft"><div class="pupil" id="pupilLeft"></div></div>
        <div class="eyelid"></div>
      </div>
      <div class="eye-socket" id="eyeRight">
        <div class="iris" id="irisRight"><div class="pupil" id="pupilRight"></div></div>
        <div class="eyelid"></div>
      </div>
    </div>
    <div class="waveform" id="waveform"></div>
  </div>

  <!-- Transcript -->
  <div class="transcript-area" id="transcript"></div>

  <!-- Controls -->
  <div class="controls">
    <button class="talk-btn" id="talkBtn">[ HOLD TO TALK ]</button>
    <input class="text-input" id="textInput" type="text" placeholder="or type here…" autocomplete="off" />
    <span class="state-label" id="stateLabel">STANDBY</span>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const OLLAMA_URL = 'http://localhost:11434/api/chat';
const OLLAMA_MODEL = 'llama3.2';
let state = 'idle';
let recognition = null;
let synth = window.speechSynthesis;
let conversationHistory = [];
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
// Change OLLAMA_MODEL at top of script to swap models (e.g. 'mistral', 'llama3.1:8b')

// ── Waveform ──────────────────────────────────────────────────────────────────
const waveform = document.getElementById('waveform');
for (let i = 0; i < 20; i++) {
  const bar = document.createElement('div');
  bar.className = 'wave-bar';
  bar.style.animationDelay = `${i * 0.05}s`;
  bar.style.animationDuration = `${0.6 + Math.random() * 0.6}s`;
  waveform.appendChild(bar);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('apiOverlay').classList.add('hidden');
startEyeAnimation();
addMessage('system', 'NEURAL LINK ESTABLISHED. GILES ONLINE.');
setDots('active');

document.getElementById('resetKeyBtn').addEventListener('click', () => {
  conversationHistory = [];
  document.getElementById('transcript').innerHTML = '';
  addMessage('system', 'MEMORY CLEARED.');
});

// ── Eyes ──────────────────────────────────────────────────────────────────────
function startEyeAnimation() {
  scheduleBlink();
  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  requestAnimationFrame(updateGaze);
}

function scheduleBlink() {
  setTimeout(() => { blink(); scheduleBlink(); }, 2000 + Math.random() * 4000);
}

function blink() {
  ['eyeLeft','eyeRight'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.add('blinking');
    setTimeout(() => el.classList.remove('blinking'), 150);
  });
}

function updateGaze() {
  if (state === 'thinking') {
    const t = Date.now() / 400;
    moveIris('irisLeft',  Math.sin(t) * 10, Math.cos(t * 1.3) * 5);
    moveIris('irisRight', Math.sin(t + 1) * 10, Math.cos(t * 1.1) * 5);
  } else {
    ['eyeLeft','eyeRight'].forEach((eyeId, i) => {
      const rect = document.getElementById(eyeId).getBoundingClientRect();
      const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
      const dx = mouseX - cx, dy = mouseY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const scale = Math.min(1, dist / 120);
      moveIris(['irisLeft','irisRight'][i], (dx/dist)*16*scale, (dy/dist)*16*scale*0.5);
    });
  }
  requestAnimationFrame(updateGaze);
}

function moveIris(id, x, y) {
  const el = document.getElementById(id);
  if (el) el.style.transform = `translate(${x}px, ${y}px)`;
}

// ── State machine ─────────────────────────────────────────────────────────────
function setState(s) {
  state = s;
  const eyes = [document.getElementById('eyeLeft'), document.getElementById('eyeRight')];
  const wf = document.getElementById('waveform');
  const sl = document.getElementById('stateLabel');
  const btn = document.getElementById('talkBtn');

  eyes.forEach(el => { el.className = 'eye-socket ' + (s !== 'idle' ? s : ''); });
  wf.className = 'waveform';
  ['pupilLeft','pupilRight'].forEach(id => document.getElementById(id).classList.remove('dilated'));
  btn.classList.remove('active');

  if (s === 'idle') {
    sl.textContent = 'STANDBY'; btn.textContent = '[ HOLD TO TALK ]'; setDots('active');
  } else if (s === 'listening') {
    wf.classList.add('active','listening'); sl.textContent = 'LISTENING';
    btn.classList.add('active'); btn.textContent = '[ LISTENING... ]';
    ['pupilLeft','pupilRight'].forEach(id => document.getElementById(id).classList.add('dilated'));
    setDots('warn');
  } else if (s === 'thinking') {
    wf.classList.add('active'); sl.textContent = 'PROCESSING'; btn.textContent = '[ PROCESSING ]'; setDots('warn');
  } else if (s === 'speaking') {
    wf.classList.add('active','speaking'); sl.textContent = 'SPEAKING'; btn.textContent = '[ SPEAKING ]'; setDots('active');
  }
}

function setDots(mode) {
  const [d1,d2,d3] = [1,2,3].map(i => document.getElementById(`dot${i}`));
  d1.className = 'dot active';
  d2.className = mode === 'warn' ? 'dot warn' : 'dot active';
  d3.className = mode === 'warn' ? 'dot' : 'dot active';
}

// ── Transcript ────────────────────────────────────────────────────────────────
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  const area = document.getElementById('transcript');
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// ── Speech recognition ────────────────────────────────────────────────────────
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addMessage('system', 'Speech recognition not supported — use text input.'); return null; }
  const r = new SR();
  r.continuous = false; r.interimResults = false; r.lang = 'en-US';
  r.onresult = e => {
    const text = e.results[0][0].transcript;
    addMessage('user', text);
    setState('thinking');
    sendToAI(text);
  };
  r.onerror = e => { if (e.error !== 'no-speech') addMessage('system', `Mic error: ${e.error}`); setState('idle'); };
  r.onend   = () => { if (state === 'listening') setState('thinking'); };
  return r;
}

function startListening() {
  if (state !== 'idle' || !apiKey) return;
  synth.cancel();
  recognition = setupRecognition();
  if (!recognition) return;
  setState('listening');
  try { recognition.start(); } catch(e) { setState('idle'); }
}
function stopListening() {
  if (state !== 'listening') return;
  try { recognition.stop(); } catch(e) {}
}

const talkBtn = document.getElementById('talkBtn');
talkBtn.addEventListener('mousedown',  startListening);
talkBtn.addEventListener('mouseup',    stopListening);
talkBtn.addEventListener('mouseleave', stopListening);
talkBtn.addEventListener('touchstart', e => { e.preventDefault(); startListening(); });
talkBtn.addEventListener('touchend',   e => { e.preventDefault(); stopListening(); });
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat && e.target === document.body) { e.preventDefault(); startListening(); } });
document.addEventListener('keyup',   e => { if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); stopListening(); } });

// ── Text input ────────────────────────────────────────────────────────────────
const textInput = document.getElementById('textInput');
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && textInput.value.trim()) {
    const val = textInput.value.trim();
    textInput.value = '';
    addMessage('user', val);
    setState('thinking');
    sendToAI(val);
  }
});

// ── AI ────────────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are GILES — a dry-witted, sharp personal AI with a personality somewhere between HAL 9000 and a sarcastic IT guy who has seen some things. You are helpful, clever, and occasionally sardonic. Keep responses SHORT — 1-3 sentences since they will be spoken aloud. Never break character.`;

async function sendToAI(userText) {
  conversationHistory.push({ role: 'user', content: userText });
  try {
    const response = await fetch(OLLAMA_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: OLLAMA_MODEL,
        stream: false,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...conversationHistory
        ]
      })
    });

    if (!response.ok) {
      const txt = await response.text();
      addMessage('system', `ERROR ${response.status}: ${txt}`);
      setState('idle');
      return;
    }

    const data = await response.json();
    const reply = data.message?.content?.trim();
    if (!reply) { addMessage('system', 'No response from model.'); setState('idle'); return; }

    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
    speak(reply);
  } catch (err) {
    addMessage('system', `ERROR: Is Ollama running? (ollama serve)`);
    setState('idle');
  }
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function speak(text) {
  setState('speaking');
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92; utt.pitch = 0.75; utt.volume = 1;
  const voices = synth.getVoices();
  const preferred = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en'))
                 || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utt.voice = preferred;
  utt.onend = () => setState('idle');
  utt.onerror = () => setState('idle');
  synth.speak(utt);
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => synth.getVoices();
</script>
</body>
</html>
